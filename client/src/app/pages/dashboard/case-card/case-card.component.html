<ion-item
  button
  detail="false"
  [class.case-row--overdue]="overdue()"
  (click)="selected.emit(caseItem().id)">

  <ion-label>
    <div class="card-header">
      <span class="case-title">{{ caseItem().title }}</span>
      @if (overdue()) {
        <span class="ec-pill ec-pill--danger">Overdue</span>
      }
    </div>
    <div class="card-meta">
      <span class="type-badge type-badge--{{ caseItem().caseType }}">{{ typeLabel() }}</span>
      <span class="milestone-name">{{ milestoneName() }}</span>
      <span class="milestone-progress">{{ caseItem().milestoneCompleted }} of {{ caseItem().milestoneTotal }} milestones completed</span>
    </div>
    <div class="ec-progress card-progress">
      <div class="ec-progress__fill" [style.width.%]="progressPercent()"></div>
    </div>
  </ion-label>

  <ion-icon slot="end" name="chevron-forward-outline" class="chevron"></ion-icon>
</ion-item>
